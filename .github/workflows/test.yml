name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  unit-and-coverage:
    name: Unit + Coverage (ubuntu, py3.11)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Detect Python tests
        id: detect_tests
        shell: bash
        run: |
          if find tests -type f -name "test_*.py" | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests (no gpu)
        if: steps.detect_tests.outputs.has_tests == 'true'
        run: |
          pytest tests -m "not integration and not gpu" --junitxml=reports/junit-unit.xml --cov=src/flux2 --cov=ui --cov-report=html:reports/coverage --cov-report=term-missing --cov-report=lcov:reports/coverage.lcov

      - name: No tests found
        if: steps.detect_tests.outputs.has_tests != 'true'
        run: echo "No Python test files found under tests/. Skipping pytest."

      - name: Upload unit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-ubuntu-py3.11
          path: |
            reports/junit-unit.xml
            reports/coverage
            reports/coverage.lcov
