name: CI
on: push
jobs:
  smoke-check:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.8
      - name: Syntax smoke check
        run: python -m compileall src ui benchmarks
      - name: Ruff fatal checks
        run: ruff check --select E9,F63,F7,F82 src ui benchmarks
